<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Email Generator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="main-container">
      <div class="glass-card">
        <h1 class="title">✉️ AI Email Generator</h1>

        <p class="subtitle">Generate professional emails instantly using AI</p>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label"> Email Purpose </label>

            <textarea
              class="form-control custom-input"
              name="purpose"
              rows="3"
              placeholder="Example: Request leave for 2 days due to personal work..."
              required
            ></textarea>
          </div>

          <div class="action-row">
            <div class="tone-group">
              <label class="form-label"> Select Tone </label>

              <select class="form-select custom-input" name="tone">
                <option>Formal</option>
                <option>Professional</option>
                <option>Business</option>
                <option>Friendly</option>
                <option>Casual</option>
              </select>
            </div>

            <button type="submit" class="generate-btn">
              ✨ Generate Email
            </button>
          </div>
        </form>

        {% if email_content %}

        <div class="result-section">
          <div class="result-header">
            <h3>Generated Email</h3>

            <button type="button" class="copy-btn" onclick="copyEmail()">
              📋 Copy
            </button>
          </div>

          <div class="output-box">
            <pre id="generatedEmail">{{ email_content }}</pre>
          </div>
        </div>

        {% endif %}
      </div>
    </div>

    <script>
      function copyEmail() {
        const emailText = document.getElementById("generatedEmail").innerText;

        navigator.clipboard
          .writeText(emailText)
          .then(() => {
            const btn = document.querySelector(".copy-btn");

            btn.innerHTML = "✅ Copied!";

            setTimeout(() => {
              btn.innerHTML = "📋 Copy";
            }, 2000);
          })
          .catch((err) => {
            console.error(err);
          });
      }
    </script>
  </body>
</html>
