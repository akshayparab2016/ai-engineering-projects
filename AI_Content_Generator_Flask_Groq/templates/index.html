<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Content Generator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="background"></div>

    <div class="container py-5">
      <div class="glass-card">
        <div class="text-center mb-4">
          <h1 class="title">✨ AI Content Generator</h1>

          <p class="subtitle">
            Blog Writer • Social Media Posts • Product Description
          </p>
        </div>

        <form method="POST" id="contentForm">
          <div class="mb-3">
            <label class="form-label"> Content Type </label>

            <select name="content_type" class="form-select custom-input">
              <option value="blog">📝 Blog Writer</option>
              <option value="social">📱 Social Media Posts</option>
              <option value="product">🛒 Product Description</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label"> Topic / Product Name </label>

            <textarea
              placeholder="Describe your content idea.. [e.g. AI Trends in 2026, Instagram Post for a Coffee Shop, Wireless Earbuds Product Description]"
              class="form-control custom-input"
              rows="4"
              name="topic"
              id="topic"
              required
            ></textarea>

            <small class="text-light">
              Characters:
              <span id="charCount">0</span>
            </small>
          </div>

          <button class="btn generate-btn w-100">
            <span id="btnText"> Generate Content </span>

            <span id="spinner" class="spinner-border spinner-border-sm d-none">
            </span>
          </button>
        </form>

        {% if result %}

        <div class="output-section mt-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Generated Content</h4>

            <button onclick="copyText()" class="btn btn-success">
              📋 Copy
            </button>
          </div>

          <div class="output-box" id="generatedText">{{ result }}</div>
        </div>

        {% endif %}
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        id="copyToast"
        class="toast align-items-center text-bg-success border-0"
      >
        <div class="d-flex">
          <div class="toast-body">Content Copied Successfully!</div>

          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script>
      const topic = document.getElementById("topic");
      const charCount = document.getElementById("charCount");

      topic.addEventListener("input", () => {
        charCount.innerText = topic.value.length;
      });

      document.getElementById("contentForm").addEventListener("submit", () => {
        document.getElementById("btnText").innerText = "Generating...";

        document.getElementById("spinner").classList.remove("d-none");
      });

      function copyText() {
        let text = document.getElementById("generatedText").innerText;

        navigator.clipboard.writeText(text);

        let toast = new bootstrap.Toast(document.getElementById("copyToast"));

        toast.show();
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
